# Render Blueprint – Infrastructure as Code
# Deploy with: https://render.com/deploy
# Docs: https://docs.render.com/infrastructure-as-code

databases:
  - name: vpc-db
    plan: free
    databaseName: vpc
    user: vpc_user
    region: frankfurt

services:
  # FastAPI Backend
  - type: web
    name: vpc-api
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: alembic upgrade head && python seed_admin.py --auto && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vpc-db
          property: connectionString
      - key: PYTHON_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false  # Set manually in dashboard
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: API_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://vpc-app.onrender.com
      - key: SESSION_EXPIRY_HOURS
        value: "24"
      - key: INACTIVITY_TIMEOUT_MINUTES
        value: "30"
      - key: RATE_LIMIT_AUTH
        value: "5/minute"
      - key: RATE_LIMIT_REGISTER
        value: "3/hour"
      - key: RATE_LIMIT_AI
        value: "10/minute"
      - key: RATE_LIMIT_VALIDATION
        value: "60/minute"
      - key: RATE_LIMIT_BYOK
        value: "10/minute"
      - key: RATE_LIMIT_BYOK_TEST
        value: "3/minute"
      - key: RATE_LIMIT_CANVAS
        value: "60/minute"
      - key: RATE_LIMIT_ADMIN
        value: "30/minute"
      - key: ADMIN_EMAIL
        sync: false  # Set manually in dashboard
      - key: ADMIN_PASSWORD
        sync: false  # Set manually in dashboard

  # Streamlit Frontend
  - type: web
    name: vpc-app
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: streamlit run ui/streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: API_BASE_URL
        value: https://vpc-api.onrender.com
      - key: API_SECRET_KEY
        fromService:
          type: web
          name: vpc-api
          envVarKey: API_SECRET_KEY
      - key: PYTHON_ENV
        value: production
